name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag and versions
        run: pnpm version:check

      - name: Quality gates
        run: pnpm verify

      - name: Stub MCP sidecar
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/soma-mcp-$triple"
          chmod +x "src-tauri/binaries/soma-mcp-$triple"

      - name: Rust quality gates
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            platform: macos-latest
            args: --target universal-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecarTarget: universal-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles deb,rpm,appimage
            rustTargets: ""
            sidecarTarget: ""
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis
            rustTargets: ""
            sidecarTarget: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.rustTargets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOMA_SIDECAR_TARGET: ${{ matrix.sidecarTarget }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Soma ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.

            macOS builds are ad-hoc signed and not notarized. See the installation instructions in README.md for the required first-launch approval.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          retryAttempts: 1

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download release assets
        run: gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload checksums and publish
        run: |
          gh release upload "$TAG" release-assets/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
