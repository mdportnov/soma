name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — format · lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version consistency
        run: pnpm version:check

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: MCP TypeScript
        run: pnpm mcp:typecheck

      - name: Biomarker reference content coverage
        run: pnpm check:biomarker-info

      - name: Build
        run: pnpm build

      - name: Drizzle migrations are up to date
        run: |
          pnpm db:generate
          git diff --exit-code src/db/migrations

  tests:
    name: Tests — vitest unit + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Unit tests for the critical pure-logic core: unit/molar conversions,
      # biomarker mapping, import validation, and repo guards. Coverage
      # thresholds live in vitest.config.ts — the run fails if that core drops
      # below them, so the dangerous code can never silently lose coverage.
      - name: Unit tests + coverage
        run: pnpm coverage

  sidecar:
    name: MCP sidecar — cross-platform build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # build-sidecar.mjs reads the host triple from `rustc -Vv`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Compiles src/index.ts into binaries/soma-mcp-<host-triple>[.exe];
      # the script throws if the expected output is missing. This is the guard
      # that keeps the sidecar build green on every OS, not just at release time.
      - name: Build sidecar
        run: pnpm mcp:sidecar

  rust:
    name: Rust — fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      # tauri::generate_context! embeds the frontend dist at compile time.
      - name: Stub frontend dist for clippy & test
        run: mkdir -p dist && touch dist/index.html

      # tauri-build validates the externalBin (MCP sidecar) path exists during
      # codegen. Neither clippy nor the unit tests run the binary, so an empty
      # stub at the host target-triple path is enough — the real sidecar is built
      # by the `sidecar` job and at release time.
      - name: Stub MCP sidecar binary for clippy & test
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/soma-mcp-$triple"
          chmod +x "src-tauri/binaries/soma-mcp-$triple"

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      # Backup round-trip + import-pipeline-adjacent Rust unit tests. Pure logic
      # (crypto/format), no Tauri runtime — the stubs above are enough to compile.
      - name: cargo test
        run: cargo test
        working-directory: src-tauri
