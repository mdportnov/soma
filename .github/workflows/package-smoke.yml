name: Packaging smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 1"

concurrency:
  group: packaging-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            platform: macos-latest
            args: --target universal-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecarTarget: universal-apple-darwin
          - name: latest Ubuntu x64
            platform: ubuntu-latest
            args: --bundles deb,rpm,appimage
            rustTargets: ""
            sidecarTarget: ""
          - name: latest Windows x64
            platform: windows-latest
            args: --bundles nsis
            rustTargets: ""
            sidecarTarget: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.rustTargets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
          SOMA_SIDECAR_TARGET: ${{ matrix.sidecarTarget }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: smoke-[platform]-[arch]-[bundle]
