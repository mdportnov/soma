name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — format · lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Biomarker reference content coverage
        run: pnpm check:biomarker-info

      - name: Import resolution & conversion checks
        run: pnpm check:import

      - name: Build
        run: pnpm build

      - name: Drizzle migrations are up to date
        run: |
          pnpm db:generate
          git diff --exit-code src/db/migrations

  sidecar:
    name: MCP sidecar — cross-platform build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # build-sidecar.mjs reads the host triple from `rustc -Vv`.
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Compiles src/index.ts into binaries/soma-mcp-<host-triple>[.exe];
      # the script throws if the expected output is missing. This is the guard
      # that keeps the sidecar build green on every OS, not just at release time.
      - name: Build sidecar
        run: pnpm mcp:sidecar

  rust:
    name: Rust — fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      # tauri::generate_context! embeds the frontend dist at compile time.
      - name: Stub frontend dist for clippy
        run: mkdir -p dist && touch dist/index.html

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
