name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer without v (for example: 0.2.0 or 0.3.0-beta.1)"
        required: true
        type: string
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.manual.outputs.sha || steps.tag.outputs.sha }}
      tag: ${{ steps.manual.outputs.tag || steps.tag.outputs.tag }}
    steps:
      - name: Require the default branch
        if: github.event_name == 'workflow_dispatch'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Run this workflow from $DEFAULT_BRANCH, not ${GITHUB_REF#refs/heads/}." >&2
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        if: github.event_name == 'workflow_dispatch'

      - uses: actions/setup-node@v7
        if: github.event_name == 'workflow_dispatch'
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch'
        run: pnpm install --frozen-lockfile

      - name: Create release commit and tag
        id: manual
        if: github.event_name == 'workflow_dispatch'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          tag="v$RELEASE_VERSION"
          if git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "$tag already exists. Re-run its existing workflow instead." >&2
            exit 1
          fi

          pnpm release:prepare "$RELEASE_VERSION"
          git diff --check
          git add package.json mcp/package.json src-tauri/Cargo.toml src-tauri/Cargo.lock CHANGELOG.md
          git diff --cached --exit-code --quiet && {
            echo "Release preparation made no changes." >&2
            exit 1
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "release: $tag"
          git tag -a "$tag" -m "Soma $tag"
          git push --atomic origin "HEAD:refs/heads/$DEFAULT_BRANCH" "refs/tags/$tag:refs/tags/$tag"

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve pushed tag
        id: tag
        if: github.event_name == 'push'
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag and versions
        env:
          GITHUB_REF_NAME: ${{ needs.prepare.outputs.tag }}
          GITHUB_REF_TYPE: tag
        run: pnpm version:check

      - name: Quality gates
        run: pnpm verify

      - name: Stub MCP sidecar
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/soma-mcp-$triple"
          chmod +x "src-tauri/binaries/soma-mcp-$triple"

      - name: Rust quality gates
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  build:
    name: Build ${{ matrix.name }}
    needs: [prepare, validate]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            platform: macos-latest
            args: --target universal-apple-darwin
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecarTarget: universal-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: --verbose --bundles deb,rpm,appimage
            rustTargets: ""
            sidecarTarget: ""
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis
            rustTargets: ""
            sidecarTarget: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.rustTargets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOMA_SIDECAR_TARGET: ${{ matrix.sidecarTarget }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: Soma ${{ needs.prepare.outputs.tag }}
          releaseBody: |
            Download the installer for your platform below.

            macOS builds are ad-hoc signed and not notarized. See the installation instructions in README.md for the required first-launch approval.
          releaseDraft: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          retryAttempts: 1

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Download release assets
        run: gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload checksums and publish
        run: |
          gh release upload "$TAG" release-assets/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
